spring:
  application:
    name: ai-helper
  profiles:
    active: local
#    reids
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1
#  数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/ai_helper?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver


# 日志输出 MyBatis SQL
logging:
  level:
    com.example.aihelper.ai.mappers: debug
# mybatis 配置
mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.example.aihelper.ai.entity.po
  configuration:
    map-underscore-to-camel-case: true

langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: qwen3-max
      embedding-model:
        model-name: text-embedding-v4
bigmodel:
  api-key:

